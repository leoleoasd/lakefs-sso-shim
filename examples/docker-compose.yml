# Full self-contained example: lakeFS + reference ACL server + the SSO shim.
#
# Brings up:
#   - aclserver : lakeFS reference ACL server (built from contrib/) -> multi-user + groups
#   - lakefs    : open-source lakeFS, delegating auth to the ACL server (rbac=simplified)
#   - sso-shim  : this project, fronting lakeFS with OIDC SSO on :8088
#
# Copy .env.example -> .env and fill in your OIDC + secret, then:  docker compose up -d
# Then bootstrap an admin (see examples/README.md), and log in at http://localhost:8088/_shim/login
#
# This example uses lakeFS's LOCAL blockstore for zero external deps. For real use,
# switch blockstore to S3 (RustFS/MinIO/AWS) — see the commented block below.

services:
  aclserver:
    image: ghcr.io/leoleoasd/lakefs-aclserver:latest   # multi-arch (amd64 + arm64)
    # to build from source instead of pulling, comment the image line and use:
    # build:
    #   context: .
    #   dockerfile: aclserver.Dockerfile
    restart: unless-stopped
    environment:
      ACLSERVER_LISTEN_ADDRESS: 0.0.0.0:8001
      ACLSERVER_DATABASE_TYPE: local
      ACLSERVER_DATABASE_LOCAL_PATH: /acl/metadata
      ACLSERVER_ENCRYPT_SECRET_KEY: ${SHARED_SECRET:?set SHARED_SECRET in .env}
    volumes:
      - acl-metadata:/acl/metadata

  lakefs:
    image: treeverse/lakefs:latest
    command: run
    restart: unless-stopped
    depends_on: [aclserver]
    # ports: ["8000:8000"]   # expose for direct access-key / CLI use (optional; the shim proxies it anyway)
    environment:
      LAKEFS_DATABASE_TYPE: local
      LAKEFS_DATABASE_LOCAL_PATH: /lakefs/metadata
      # --- blockstore: local (default, dependency-free) ---
      LAKEFS_BLOCKSTORE_TYPE: local
      LAKEFS_BLOCKSTORE_LOCAL_PATH: /lakefs/data
      # --- blockstore: S3-compatible (RustFS/MinIO/AWS) — uncomment & set, remove the two local lines above ---
      # LAKEFS_BLOCKSTORE_TYPE: s3
      # LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: "true"
      # LAKEFS_BLOCKSTORE_S3_ENDPOINT: http://your-s3:9000
      # LAKEFS_BLOCKSTORE_S3_REGION: us-east-1
      # LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      # LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      # --- auth: delegate to the ACL server (this is what enables multi-user/groups) ---
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: ${SHARED_SECRET:?set SHARED_SECRET in .env}
      LAKEFS_AUTH_API_ENDPOINT: http://aclserver:8001/api/v1
      LAKEFS_AUTH_UI_CONFIG_RBAC: simplified
      LAKEFS_LOGGING_LEVEL: INFO
    volumes:
      - lakefs-metadata:/lakefs/metadata
      - lakefs-data:/lakefs/data

  sso-shim:
    image: ghcr.io/leoleoasd/lakefs-sso-shim:latest
    # to build from this checkout instead of pulling, comment the image line and use:
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [lakefs, aclserver]
    ports:
      - "8088:8088"
    environment:
      LISTEN_ADDR: ":8088"
      LAKEFS_UPSTREAM: http://lakefs:8000
      ACL_BASE: http://aclserver:8001/api/v1/auth
      LAKEFS_SHARED_SECRET: ${SHARED_SECRET:?set SHARED_SECRET in .env}
      OIDC_ISSUER: ${OIDC_ISSUER:?set OIDC_ISSUER in .env}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?set OIDC_CLIENT_ID in .env}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:?set OIDC_REDIRECT_URL in .env}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
      OIDC_USERNAME_CLAIM: ${OIDC_USERNAME_CLAIM:-preferred_username}
      LAKEFS_DEFAULT_GROUP: ${LAKEFS_DEFAULT_GROUP:-Readers}
      GROUP_MAP: ${GROUP_MAP:-}   # optional idpGroup:lakefsGroup pairs (names may differ; only listed grant access)
      SCIM_TOKEN: ${SCIM_TOKEN:-}   # set to enable SCIM at /scim/v2 (IdP-pushed deprovisioning)

volumes:
  acl-metadata:
  lakefs-metadata:
  lakefs-data:
